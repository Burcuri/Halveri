name: Istanbul Hal Fiyatlari - Gunluk Cekim

on:
  schedule:
    # Her gün TSİ 12:00'de çalışır (UTC 09:00 = TSİ 12:00, yaz saati)
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # "Actions" sekmesinden elle de tetikleyebilirsin

jobs:
  cek-ve-yaz:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: pip install requests beautifulsoup4 lxml supabase

      - name: Istanbul verisini çek ve Supabase'e yaz
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scrapers/istanbul_otomatik.py
