<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Hal Fiyatları</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <h1>Türkiye Hal Fiyatları</h1>
</header>

<!-- KİŞİSELLEŞTİRME BANDI — 3 buton yan yana -->
<section class="kisisel-bant">
  <div class="kisisel-satir">
    <button id="illerBtn" class="bant-btn">📍 İller <span id="illerSayisi"></span></button>
    <button id="urunEkleBtn" class="bant-btn bant-btn-vurgulu">+ Ürün Ekle</button>
    <button id="updateButton" class="bant-btn">🔄 Verileri Güncelle</button>
  </div>

  <div id="illerPanel" class="dropdown-panel" style="display:none">
    <div class="il-bandi-baslik">Takip ettiğin iller (en fazla 4) — seçim sırası gösterge tipini belirler</div>
    <div class="il-bandi-satirlar" id="ilBandiSatirlari"></div>
  </div>

  <div id="urunEklePanel" class="dropdown-panel" style="display:none">
    <div id="katalogListesi"></div>
  </div>

  <div id="takipCipleri" class="takip-cipleri"></div>
</section>

<!-- REKLAM BANDI -->
<div class="sponsor">
  <span class="sponsor-icon">◆</span>
  <span class="sponsor-text">Lorem Ipsum Sponsorluk</span>
</div>

<!-- CANLI GRAFİK -->
<section class="canli-grafik-bolumu">
  <div class="grafik-kutu">
    <canvas id="canliGrafik"></canvas>
  </div>
  <div class="zaman-secim" id="zamanSecim">
    <button data-aralik="hafta" class="active">Hafta</button>
    <button data-aralik="ay">Ay</button>
    <button data-aralik="yil">Yıl</button>
  </div>
</section>

<section class="info">
  <div>
    Son Güncelleme
    <br>
    <span id="updateTime">-</span>
  </div>
  <div>
    Takip Edilen Tip
    <br>
    <span id="productCount">0</span>
  </div>
</section>

<section>
  <table>
    <thead>
      <tr>
        <th>Ürün</th>
        <th>Hal (İl)</th>
        <th>Min</th>
        <th>Max</th>
      </tr>
    </thead>
    <tbody id="priceTable"></tbody>
  </table>
</section>

<script src="config.js"></script>
<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
