<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Hal Fiyatları</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <h1>Türkiye Hal Fiyatları</h1>
  <button id="updateButton">Verileri Güncelle</button>
</header>

<!-- SPONSOR -->
<div class="sponsor">
  <span class="sponsor-icon">🚜</span>
  <div class="sponsor-text">
    <span class="sponsor-label">SPONSOR</span>
    <strong>LOREM IPSUM TARIM MAKİNALARI</strong>
  </div>
</div>

<!-- KİŞİSELLEŞTİRME BANDI -->
<section class="kisisel-bant">
  <div id="takipCipleri" class="takip-cipleri"></div>
  <button id="urunEkleBtn" class="urun-ekle-btn">+ Ürün Ekle</button>

  <!-- Ürün ekleme paneli (katalog) -->
  <div id="urunEklePanel" class="urun-ekle-panel" style="display:none">
    <div id="katalogListesi"></div>
  </div>

  <!-- Seçili bir cip'e tıklanınca açılan il/Türkiye paneli -->
  <div id="ilSecimPanel" class="il-secim-panel" style="display:none"></div>
</section>

<!-- CANLI GRAFİK -->
<section class="canli-grafik-bolumu">
  <div class="grafik-kutu">
    <canvas id="canliGrafik"></canvas>
  </div>
  <div class="zaman-secim" id="zamanSecim">
    <button data-aralik="hafta" class="active">Hafta</button>
    <button data-aralik="ay">Ay</button>
    <button data-aralik="yil">Yıl</button>
  </div>
</section>

<section class="info">
  <div>
    Son Güncelleme
    <br>
    <span id="updateTime">-</span>
  </div>
  <div>
    Takip Edilen Tip
    <br>
    <span id="productCount">0</span>
  </div>
</section>

<section>
  <table>
    <thead>
      <tr>
        <th>Ürün</th>
        <th>Hal (İl)</th>
        <th>Min</th>
        <th>Max</th>
      </tr>
    </thead>
    <tbody id="priceTable"></tbody>
  </table>
</section>

<script src="config.js"></script>
<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
