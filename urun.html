<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domates Fiyatları — Türkiye Hal Fiyatları</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="urun.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="backlink">← Tüm ürünler</a>
</header>

<!-- SPONSOR -->
<div class="sponsor">
  <span class="sponsor-icon">🚜</span>
  <div class="sponsor-text">
    <span class="sponsor-label">SPONSOR</span>
    <strong>LOREM IPSUM TARIM MAKİNALARI</strong>
  </div>
</div>

<!-- ÜRÜN SEKMELERİ (ilk sürümde tek ürün, altyapı hazır) -->
<nav class="urun-tabs" id="urunTabs">
  <button class="tab active" data-urun="domates">🍅 Domates</button>
  <!-- sonraki adımda: salatalık, patlıcan, karpuz -->
</nav>

<main class="urun-panel">

  <div class="urun-baslik">
    <h1><span id="urunEmoji">🍅</span> <span id="urunAd">Domates</span></h1>
    <button id="takipBtn" class="takip-btn">+ Takip Et</button>
  </div>

  <div class="grafik-kutu">
    <canvas id="fiyatGrafik"></canvas>
  </div>

  <div class="kontrol-satiri">
    <div class="zaman-secim" id="zamanSecim">
      <button data-aralik="hafta" class="active">Hafta</button>
      <button data-aralik="ay">Ay</button>
      <button data-aralik="yil">Yıl</button>
    </div>

    <div class="grafik-tipi" id="grafikTipi">
      <label><input type="radio" name="grafikTip" value="cizgi" checked> ● Çizgi</label>
      <label><input type="radio" name="grafikTip" value="geometrik"> ○ Geometrik</label>
      <label><input type="radio" name="grafikTip" value="nokta"> ○ Nokta</label>
      <label><input type="radio" name="grafikTip" value="kolon"> ○ Kolon</label>
    </div>
  </div>

  <div class="il-listesi" id="ilListesi">
    <!-- JS ile dolduruluyor -->
  </div>

</main>

<script src="config.js"></script>
<script src="urun.js"></script>
</body>
</html>
